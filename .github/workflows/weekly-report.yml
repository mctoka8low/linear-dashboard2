name: Weekly Linear Report
on:
  schedule:
    - cron: "0 0 * * 2"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/generate-report.js
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report.json
          git diff --staged --quiet || git commit -m "chore: weekly report $(date +%Y-%m-%d)" && git push
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK_URL" \
          -d '{
            "username": "小野寺葵 Bot",
            "content": "@everyone よかよか〜！今週の週次レポートばい更新されたっちゃん🎉\n\nプロジェクトの進捗とサマリば確認してみてね👇\nhttps://mctoka8low.github.io/linear-dashboard2/"
          }'
